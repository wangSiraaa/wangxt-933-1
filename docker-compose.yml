version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deposit-refund-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deposit-refund-frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  smoke-test:
    image: node:18-alpine
    container_name: deposit-refund-smoke
    working_dir: /app
    volumes:
      - ./scripts/smoke.js:/app/smoke.js:ro
    environment:
      - BASE_URL=http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
    command: ["node", "smoke.js"]
    restart: "no"
